{% extends "base.html" %}
{% block title %}Logs — {{ app_name }}{% endblock %}

{% block content %}
<div x-data="logsTable()" x-init="init()">

    <!-- Toolbar -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:0.75rem;">
        <h1 style="margin:0;font-size:1.4rem;font-weight:700;">Logs</h1>
        <div style="display:flex;align-items:center;gap:0.6rem;flex-wrap:wrap;">

            <!-- Instance filter -->
            <select class="form-select" style="font-size:0.82rem;padding:0.3rem 0.6rem;width:auto;"
                    x-model="filterInstance" @change="page = 0">
                <option value="">All instances</option>
                {% for inst in all_instances %}
                <option value="{{ inst.name }}">{{ inst.name }}</option>
                {% endfor %}
            </select>

            <!-- Level filter -->
            <select class="form-select" style="font-size:0.82rem;padding:0.3rem 0.6rem;width:auto;"
                    x-model="filterLevel" @change="page = 0">
                <option value="">All levels</option>
                <option value="info">Info</option>
                <option value="warn">Warn</option>
                <option value="error">Error</option>
                <option value="debug">Debug</option>
            </select>

            <!-- Per page -->
            <select class="form-select" style="font-size:0.82rem;padding:0.3rem 0.6rem;width:auto;"
                    x-model.number="perPage" @change="page = 0">
                <option value="20">20 / page</option>
                <option value="50">50 / page</option>
                <option value="100">100 / page</option>
            </select>

            <!-- Live toggle -->
            <button @click="$store.logs.toggleEnabled()" class="btn btn-secondary btn-sm"
                    :class="$store.logs.enabled ? 'btn-active' : ''"
                    x-text="$store.logs.enabled ? 'Live ●' : 'Paused ○'"
                    :style="$store.logs.enabled ? 'color:var(--green)' : ''">
            </button>

            <!-- Debug toggle -->
            <button @click="$store.logs.toggleDebug()" class="btn btn-secondary btn-sm"
                    :class="$store.logs.debug ? 'btn-primary' : ''"
                    x-text="$store.logs.debug ? 'Debug: ON' : 'Debug: OFF'">
            </button>

            <button @click="$store.logs.clear()" class="btn btn-secondary btn-sm">Clear view</button>
            <button onclick="clearAllLogs()" class="btn btn-danger btn-sm">Clear DB</button>
        </div>
    </div>

    <!-- Table -->
    <div class="card" style="overflow:hidden;">
        <div style="overflow-x:auto;">
            <table class="table" style="table-layout:fixed;width:100%;">
                <colgroup>
                    <col style="width:140px;">
                    <col style="width:130px;">
                    <col style="width:60px;">
                    <col style="width:110px;">
                    <col>
                </colgroup>
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Instance</th>
                        <th>Level</th>
                        <th>Skill</th>
                        <th>Message</th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="entry in pageEntries()" :key="entry._id">
                        <tr :class="`log-row-${entry.level}`">
                            <td style="font-size:0.78rem;color:var(--text-muted);white-space:nowrap;font-family:'JetBrains Mono',monospace;"
                                x-text="fmt(entry.created_at)"></td>
                            <td style="font-size:0.82rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"
                                x-text="entry.instance_name" :title="entry.instance_name"></td>
                            <td>
                                <span :class="`badge log-badge-${entry.level}`" x-text="entry.level"></span>
                            </td>
                            <td style="font-size:0.78rem;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"
                                x-text="(entry.skill || '').replace('_',' ')"></td>
                            <td style="font-size:0.82rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"
                                x-text="entry.message" :title="entry.message"></td>
                        </tr>
                    </template>

                    <template x-if="filteredEntries().length === 0">
                        <tr>
                            <td colspan="5" style="text-align:center;color:var(--text-muted);padding:2rem;">
                                No log entries yet.
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div style="display:flex;align-items:center;justify-content:space-between;padding:0.6rem 1rem;border-top:1px solid var(--border);font-size:0.82rem;color:var(--text-muted);">
            <span x-text="paginationLabel()"></span>
            <div style="display:flex;gap:0.4rem;">
                <button class="btn btn-secondary btn-sm" @click="page--" :disabled="page === 0">← Prev</button>
                <template x-for="p in pageCount()" :key="p">
                    <button class="btn btn-sm"
                            :class="page === p - 1 ? 'btn-primary' : 'btn-secondary'"
                            @click="page = p - 1"
                            x-text="p"
                            x-show="Math.abs(page - (p-1)) <= 2">
                    </button>
                </template>
                <button class="btn btn-secondary btn-sm" @click="page++" :disabled="page >= pageCount() - 1">Next →</button>
            </div>
        </div>
    </div>
</div>

<style>
.log-row-error td { background: rgba(220,50,50,0.06); }
.log-row-warn  td { background: rgba(220,160,50,0.06); }
.log-row-debug td { opacity: 0.6; }

.log-badge-info  { background: var(--border); color: var(--text-secondary); }
.log-badge-warn  { background: rgba(220,160,50,0.25); color: #e0a030; }
.log-badge-error { background: rgba(220,50,50,0.25); color: #e05050; }
.log-badge-debug { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
</style>

<script>
function logsTable() {
    return {
        page: 0,
        perPage: 20,
        filterInstance: '',
        filterLevel: '',
        _filtered: [],

        init() {
            this._refilter();
            this.$watch('$store.logs.entries', () => this._refilter());
            this.$watch('filterInstance', () => { this.page = 0; this._refilter(); });
            this.$watch('filterLevel',    () => { this.page = 0; this._refilter(); });
        },

        _refilter() {
            let entries = this.$store.logs.entries;
            if (this.filterInstance) entries = entries.filter(e => e.instance_name === this.filterInstance);
            if (this.filterLevel)    entries = entries.filter(e => e.level === this.filterLevel);
            this._filtered = entries;
        },

        pageEntries() {
            const start = this.page * this.perPage;
            return this._filtered.slice(start, start + this.perPage);
        },

        pageCount() {
            return Math.max(1, Math.ceil(this._filtered.length / this.perPage));
        },

        paginationLabel() {
            const total = this._filtered.length;
            const start = this.page * this.perPage + 1;
            const end = Math.min(start + this.perPage - 1, total);
            return total === 0 ? '0 entries' : `${start}–${end} of ${total}`;
        },

        fmt(ts) {
            if (!ts) return '—';
            return ts.replace('T', ' ').substring(0, 19);
        }
    };
}

async function clearAllLogs() {
    if (!confirm('Clear all logs from database?')) return;
    const resp = await fetch('/api/activity', { method: 'DELETE' });
    if (resp.ok) {
        Alpine.store('toasts').add('Logs cleared', 'info');
        Alpine.store('logs').clear();
    }
}
</script>
{% endblock %}
