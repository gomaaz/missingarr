services:
  missingarr:
    image: gomaaz/missingarr:latest
    container_name: missingarr
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    environment:
      - LOG_LEVEL=INFO
      - TZ=Europe/Berlin
      # Authentication — set both to enable login protection
      - AUTH_USERNAME=admin
      - AUTH_PASSWORD=
      # Generate with: python -c "import secrets; print(secrets.token_hex(32))"
      - SECRET_KEY=
    restart: unless-stopped
