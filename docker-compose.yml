services:
  missingarr:
    image: gomaaz/missingarr:latest
    container_name: missingarr
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      - LOG_LEVEL=INFO
      - TZ=Europe/Berlin
      # Authentication — always active
      # If AUTH_PASSWORD is not set, a temporary password is printed in the logs
      - AUTH_USERNAME=admin
      - AUTH_PASSWORD=
      # Stable session key — generate with: python -c "import secrets; print(secrets.token_hex(32))"
      - SECRET_KEY=
    restart: unless-stopped
